
- title: Digital Image Processing
  # url: "/courses/dip/"
  code: "CS 491/591-006<br>(CS 422/522)"
  role: "Spring 2026"
  materials:
    - name: "This course introduces the foundations and techniques for 2D and 3D imaging. From classical Fourier analysis to modern deep-learning models, we explore a broad spectrum of image-based technologies, including segmentation, recognition, volumetric capture, depth estimation, clustering, convolutional neural networks, and generative models."
