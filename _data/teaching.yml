- title: Introduction to Computer Graphics
  # url: "/courses/icg/"
  code: "CS 412/512"
  role: "Fall 2025"
  materials:
    - name: "This course will cover the fundamentals of 2D and 3D computer graphics, such as curves, 3D modeling, animation, and rendering. At the end of the semester, the students will be able to understand the core concepts of computer graphics and build their own real-time graphics pipeline that runs in a web browser."
